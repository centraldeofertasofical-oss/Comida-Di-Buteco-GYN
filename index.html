<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F5A623">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Buteco GYN">
<meta name="description" content="Roteiro do Comida di Buteco 2026 em Goiânia — GPS em tempo real, 49 bares participantes">
<link rel="manifest" href="manifest.json">
<title>Buteco GYN 2026</title>

<!-- Leaflet CSS — gratuito, sem API key -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ── RESET & BASE ────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --beer:#F5A623;--beer2:#D4881C;--beer3:#8B5E0A;
  --bg:#0A0805;--bg2:#141008;--bg3:#1E1710;--bg4:#28211A;
  --surface:#221C14;--surface2:#2E261C;
  --cream:#F0E6CC;--cream2:#C8B898;--cream3:#8A7A60;
  --green:#2A5C3F;--green2:#3D8A5F;--green3:#52B788;
  --red:#B83030;--blue:#2563EB;
  --r:16px;--r2:12px;--r3:8px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--cream);font-family:'Outfit',sans-serif;font-size:15px;line-height:1.4}

/* ── SPLASH ─────────────────────────────────────── */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:24px;padding:40px 32px;text-align:center;
}
.splash-beer{font-size:80px;animation:rock 2s ease-in-out infinite}
@keyframes rock{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
.splash-title{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--beer);letter-spacing:3px;line-height:1}
.splash-sub{color:var(--cream3);font-size:.95rem;line-height:1.6;max-width:280px}
.splash-year{
  background:var(--beer);color:var(--bg);
  font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:500;
  padding:3px 12px;border-radius:100px;letter-spacing:2px;
}
.btn-gps{
  background:linear-gradient(135deg,var(--beer),var(--beer2));
  color:var(--bg);border:none;border-radius:var(--r);
  padding:16px 40px;font-family:'Bebas Neue',sans-serif;
  font-size:1.3rem;letter-spacing:2px;cursor:pointer;
  width:100%;max-width:300px;
  box-shadow:0 8px 32px rgba(245,166,35,.3);
  transition:transform .15s,box-shadow .15s;
}
.btn-gps:active{transform:scale(.97);box-shadow:0 4px 16px rgba(245,166,35,.2)}
.splash-status{
  font-family:'JetBrains Mono',monospace;font-size:.75rem;
  color:var(--green3);min-height:18px;
}
.splash-skip{color:var(--cream3);font-size:.78rem;text-decoration:underline;cursor:pointer;margin-top:-8px}

/* ── APP SHELL ──────────────────────────────────── */
#app{display:none;height:100%;flex-direction:column}

/* ── HEADER ─────────────────────────────────────── */
.topbar{
  background:var(--bg2);
  border-bottom:1px solid rgba(245,166,35,.15);
  padding:calc(12px + var(--safe-top)) 16px 12px;
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
  position:relative;z-index:100;
}
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--beer);letter-spacing:2px;line-height:1}
.topbar-sub{font-size:.62rem;font-family:'JetBrains Mono',monospace;color:var(--cream3);letter-spacing:1px;text-transform:uppercase}
.topbar-spacer{flex:1}
.gps-pill{
  display:flex;align-items:center;gap:5px;
  background:var(--surface);border:1px solid rgba(245,166,35,.2);
  border-radius:100px;padding:5px 10px;
  font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--cream3);
  cursor:pointer;transition:border-color .2s;
}
.gps-pill.ok{border-color:rgba(82,183,136,.4);color:var(--green3)}
.gps-pill.ok .gps-dot{background:var(--green3);animation:blink 2s ease-in-out infinite}
.gps-dot{width:7px;height:7px;border-radius:50%;background:var(--cream3);transition:background .3s}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── TABS ───────────────────────────────────────── */
.tabs{
  display:flex;background:var(--bg2);
  border-bottom:1px solid rgba(245,166,35,.1);
  flex-shrink:0;
}
.tab{
  flex:1;padding:12px 8px;text-align:center;
  font-family:'JetBrains Mono',monospace;font-size:.65rem;
  color:var(--cream3);cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .2s;letter-spacing:1px;text-transform:uppercase;
}
.tab.active{color:var(--beer);border-bottom-color:var(--beer)}

/* ── CONTENT ────────────────────────────────────── */
.content{flex:1;overflow:hidden;position:relative}
.pane{position:absolute;inset:0;display:none;flex-direction:column}
.pane.active{display:flex}

/* ── MAPA ───────────────────────────────────────── */
#map{flex:1;z-index:1}
.map-fab{
  position:absolute;bottom:calc(16px + var(--safe-bot));right:16px;z-index:1000;
  width:52px;height:52px;border-radius:50%;
  background:var(--beer);color:var(--bg);
  border:none;font-size:1.4rem;cursor:pointer;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s;
}
.map-fab:active{transform:scale(.92)}

/* Popup do mapa */
.leaflet-popup-content-wrapper{
  background:var(--surface)!important;border:1px solid rgba(245,166,35,.3)!important;
  border-radius:var(--r2)!important;box-shadow:0 8px 32px rgba(0,0,0,.5)!important;
  padding:0!important;overflow:hidden;
}
.leaflet-popup-content{margin:0!important;color:var(--cream)}
.leaflet-popup-tip{background:var(--surface)!important}
.popup-inner{padding:14px 16px}
.popup-name{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--beer);letter-spacing:1px}
.popup-petisco{font-size:.82rem;color:var(--cream2);font-style:italic;margin:3px 0 8px}
.popup-dist{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--green3)}
.popup-btn{
  display:block;width:100%;
  background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.3);
  color:var(--beer);padding:8px;
  font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:1px;
  text-align:center;cursor:pointer;text-decoration:none;margin-top:10px;
  border-radius:var(--r3);transition:background .2s;
}
.popup-btn:hover{background:rgba(245,166,35,.22)}

/* ── LISTA ──────────────────────────────────────── */
.list-controls{
  padding:12px;display:flex;flex-direction:column;gap:8px;
  background:var(--bg2);border-bottom:1px solid rgba(245,166,35,.08);flex-shrink:0;
}
.search-wrap{position:relative}
.search-wrap input{
  width:100%;background:var(--surface);
  border:1px solid rgba(245,166,35,.18);border-radius:var(--r2);
  padding:10px 12px 10px 36px;color:var(--cream);
  font-family:'Outfit',sans-serif;font-size:.88rem;outline:none;
  transition:border-color .2s;
}
.search-wrap input:focus{border-color:rgba(245,166,35,.5)}
.search-wrap input::placeholder{color:var(--cream3)}
.search-wrap .si{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  font-size:.85rem;color:var(--cream3);pointer-events:none;
}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;background:var(--surface);
  border:1px solid rgba(245,166,35,.18);border-radius:100px;
  padding:5px 13px;font-size:.7rem;font-family:'JetBrains Mono',monospace;
  color:var(--cream3);cursor:pointer;transition:all .2s;white-space:nowrap;
}
.chip.on{background:rgba(245,166,35,.15);border-color:var(--beer);color:var(--beer)}
.chip.sort-on{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.5);color:#60a5fa}

.list-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 12px calc(8px + var(--safe-bot))}
.list-body::-webkit-scrollbar{display:none}

.bar-item{
  background:var(--surface);border:1px solid rgba(245,166,35,.1);
  border-radius:var(--r);padding:14px 14px 40px;
  margin-bottom:8px;position:relative;overflow:hidden;
  transition:border-color .2s,transform .15s;
}
.bar-item::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--beer),var(--beer2));
  transform:scaleX(0);transition:transform .25s;transform-origin:left;
}
.bar-item:active{transform:scale(.99)}
.bar-item.in-tour{border-color:rgba(82,183,136,.4);background:linear-gradient(135deg,var(--surface),rgba(42,92,63,.25))}
.bar-item.in-tour::before,.bar-item:hover::before{transform:scaleX(1)}
.bar-item.you-here{border-color:rgba(245,166,35,.6);box-shadow:0 0 20px rgba(245,166,35,.08)}
.bar-item.you-here::before{background:linear-gradient(90deg,#FFD700,var(--beer));transform:scaleX(1)}

.item-badge{
  position:absolute;top:12px;right:12px;
  font-family:'JetBrains Mono',monospace;font-size:.55rem;
  padding:2px 8px;border-radius:100px;letter-spacing:1px;
}
.badge-you{background:rgba(245,166,35,.18);border:1px solid rgba(245,166,35,.5);color:var(--beer)}
.badge-tour{background:rgba(82,183,136,.12);border:1px solid rgba(82,183,136,.4);color:var(--green3)}
.badge-near{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:#60a5fa}

.item-name{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;color:var(--cream);letter-spacing:1px;padding-right:72px;margin-bottom:2px}
.item-city{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--beer);background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.18);padding:1px 7px;border-radius:100px;display:inline-block;margin-bottom:8px}

.dist-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.dist-lbl{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:#60a5fa;white-space:nowrap;min-width:52px}
.dist-track{flex:1;height:3px;background:rgba(59,130,246,.1);border-radius:2px;overflow:hidden}
.dist-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#60a5fa);border-radius:2px;transition:width .4s}

.petisco-box{
  background:rgba(245,166,35,.05);border:1px solid rgba(245,166,35,.1);
  border-radius:var(--r3);padding:8px 11px;margin-bottom:9px;
}
.petisco-lbl{font-size:.58rem;font-family:'JetBrains Mono',monospace;color:var(--cream3);text-transform:uppercase;letter-spacing:2px;margin-bottom:2px}
.petisco-name{font-size:.88rem;color:var(--beer);font-style:italic;font-weight:500}

.item-addr{font-size:.73rem;color:var(--cream3);margin-bottom:4px;display:flex;gap:5px;line-height:1.4}
.item-hrs{font-size:.68rem;color:var(--cream3);margin-bottom:12px;display:flex;gap:5px}

.item-actions{display:flex;gap:6px}
.btn-add{
  flex:1;background:transparent;border:1px solid rgba(82,183,136,.35);
  border-radius:var(--r3);padding:8px 6px;
  color:var(--green3);font-family:'JetBrains Mono',monospace;font-size:.65rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;
  transition:background .2s;letter-spacing:.5px;
}
.btn-add.on{background:rgba(82,183,136,.12);border-color:var(--green3)}
.btn-add:active{background:rgba(82,183,136,.2)}
.btn-ico{
  background:transparent;border:1px solid rgba(245,166,35,.2);
  border-radius:var(--r3);padding:8px 10px;font-size:.88rem;
  cursor:pointer;text-decoration:none;display:flex;align-items:center;
  color:var(--beer);transition:background .2s;
}
.btn-ico:active{background:rgba(245,166,35,.1)}
.item-price{position:absolute;bottom:11px;right:12px;font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--cream3);background:var(--bg3);border-radius:6px;padding:2px 7px}

.no-res{text-align:center;padding:60px 20px;color:var(--cream3);font-style:italic}

/* ── ROTEIRO ────────────────────────────────────── */
.tour-pane{padding:12px 12px calc(12px + var(--safe-bot));overflow-y:auto;-webkit-overflow-scrolling:touch}
.tour-pane::-webkit-scrollbar{display:none}
.tour-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.tour-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--beer);letter-spacing:2px}
.tour-cnt-badge{background:var(--green3);color:var(--bg);font-family:'JetBrains Mono',monospace;font-size:.65rem;font-weight:600;padding:3px 10px;border-radius:100px}

.stop-item{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border:1px solid rgba(82,183,136,.15);
  border-radius:var(--r2);padding:12px;margin-bottom:6px;
}
.stop-num{
  background:var(--green3);color:var(--bg);
  font-family:'JetBrains Mono',monospace;font-size:.65rem;font-weight:700;
  min-width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.stop-info{flex:1;overflow:hidden}
.stop-name{font-family:'Bebas Neue',sans-serif;font-size:.98rem;color:var(--cream);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stop-petisco{font-size:.7rem;color:var(--beer);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stop-dist{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:#60a5fa;flex-shrink:0}
.stop-rm{background:none;border:none;color:var(--cream3);font-size:1rem;cursor:pointer;padding:4px;flex-shrink:0;line-height:1}

.tour-empty{text-align:center;padding:60px 20px;color:var(--cream3)}
.tour-empty-icon{font-size:3rem;margin-bottom:12px}
.tour-empty-txt{font-size:.88rem;line-height:1.6}

.btn-maps-big{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;background:linear-gradient(135deg,var(--green),var(--green3));
  border:none;border-radius:var(--r);padding:16px;
  color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:2px;
  cursor:pointer;margin-bottom:10px;text-decoration:none;
  transition:opacity .2s;
}
.btn-maps-big:active{opacity:.85}
.btn-clr{
  width:100%;background:transparent;border:1px solid rgba(184,48,48,.3);
  border-radius:var(--r);padding:12px;color:var(--red);
  font-family:'JetBrains Mono',monospace;font-size:.72rem;cursor:pointer;
  transition:background .2s;letter-spacing:1px;
}
.btn-clr:active{background:rgba(184,48,48,.12)}

.tour-total{
  background:var(--surface2);border:1px solid rgba(245,166,35,.1);
  border-radius:var(--r2);padding:12px 14px;margin-bottom:12px;
  display:flex;justify-content:space-between;align-items:center;
  font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--cream3);
}
.tour-total span{color:var(--beer);font-size:.85rem}

/* ── TOAST ──────────────────────────────────────── */
.toast{
  position:fixed;bottom:calc(20px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--green);color:#fff;
  padding:10px 20px;border-radius:100px;
  font-family:'JetBrains Mono',monospace;font-size:.75rem;
  z-index:9999;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── LEAFLET CUSTOM ─────────────────────────────── */
.leaflet-container{background:#0A0805!important}
.my-marker{
  width:16px;height:16px;border-radius:50%;
  background:#F5A623;border:2.5px solid #fff;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
  cursor:pointer;transition:transform .15s;
}
.my-marker:hover,.my-marker.tour{transform:scale(1.3);background:#52B788}
.my-marker.youhere{background:#FFD700;border-color:#D4881C;transform:scale(1.4)}
.user-dot{
  width:18px;height:18px;border-radius:50%;
  background:#3b82f6;border:3px solid #fff;
  box-shadow:0 0 0 6px rgba(59,130,246,.2);
  animation:userpulse 2s ease-in-out infinite;
}
@keyframes userpulse{0%,100%{box-shadow:0 0 0 6px rgba(59,130,246,.2)}50%{box-shadow:0 0 0 12px rgba(59,130,246,.05)}}

/* RESULTADO BARRA DE INFO */
.res-bar{
  padding:6px 12px;background:var(--bg3);
  border-bottom:1px solid rgba(245,166,35,.06);
  font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--cream3);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
</style>
</head>
<body>

<!-- ── SPLASH ─────────────────────────────────── -->
<div id="splash">
  <div class="splash-year">COMIDA DI BUTECO 2026</div>
  <div class="splash-beer">🍺</div>
  <div class="splash-title">Buteco<br>GYN</div>
  <div class="splash-sub">49 bares em Goiânia e Aparecida. Monte seu roteiro com GPS em tempo real.</div>
  <button class="btn-gps" onclick="startGPS()">📍 LOCALIZAR MEU CELULAR</button>
  <div class="splash-status" id="splashMsg"></div>
  <div class="splash-skip" onclick="startApp(false)">Continuar sem GPS (localização padrão)</div>
</div>

<!-- ── APP ───────────────────────────────────── -->
<div id="app">
  <!-- Topbar -->
  <div class="topbar">
    <div>
      <div class="topbar-logo">🍺 Buteco GYN</div>
      <div class="topbar-sub">10 ABR – 10 MAI · GOIÂNIA</div>
    </div>
    <div class="topbar-spacer"></div>
    <div class="gps-pill" id="gpsPill" onclick="recenterMap()">
      <div class="gps-dot" id="gpsDot"></div>
      <span id="gpsLabel">GPS</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="showTab('mapa')">🗺 Mapa</div>
    <div class="tab" onclick="showTab('lista')">📋 Bares</div>
    <div class="tab" onclick="showTab('tour')">⭐ Roteiro (<span id="tabCnt">0</span>)</div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- PANE MAPA -->
    <div class="pane active" id="pane-mapa">
      <div id="map"></div>
      <button class="map-fab" onclick="recenterMap()" title="Minha localização">📍</button>
    </div>

    <!-- PANE LISTA -->
    <div class="pane" id="pane-lista">
      <div class="list-controls">
        <div class="search-wrap">
          <span class="si">🔍</span>
          <input type="text" id="search" placeholder="Buscar bar, petisco ou bairro...">
        </div>
        <div class="chips">
          <div class="chip on" data-city="all">Todos</div>
          <div class="chip" data-city="Goiânia">Goiânia (42)</div>
          <div class="chip" data-city="Aparecida">Aparecida (7)</div>
          <div class="chip sort-on" id="chipDist" onclick="setSort('dist')">📍 Distância</div>
          <div class="chip" id="chipName" onclick="setSort('name')">🔤 A–Z</div>
        </div>
      </div>
      <div class="res-bar">
        <span id="resCnt">49 bares</span>
        <span id="locInfo" style="color:var(--cream3)">—</span>
      </div>
      <div class="list-body" id="listBody"></div>
    </div>

    <!-- PANE ROTEIRO -->
    <div class="pane" id="pane-tour">
      <div class="tour-pane" id="tourPane"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Leaflet JS — gratuito, sem API key -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ═══════════════════════════════════════════════
// DADOS — 49 BARES OFICIAIS VERIFICADOS
// ═══════════════════════════════════════════════
const BARS = [
  {n:"Dom Marco",p:"Passtel Mini Verdinho",a:"Rua T-45, 88 – Setor Bueno",c:"Goiânia",h:"Seg–Sex 16h–0h | Sáb 10h–0h",ig:"dommarcobar",lat:-16.6890,lng:-49.2770},

// ═══════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════
let LAT = -16.6890, LNG = -49.2770;
let gpsOk = false, watchId = null;
let tour = [], city = 'all', q = '', sort = 'dist';
let map = null, userMarker = null, barMarkers = {};
let activeTab = 'mapa';

// ═══════════════════════════════════════════════
// GPS
// ═══════════════════════════════════════════════
function startGPS() {
  if (!navigator.geolocation) { startApp(false); return; }
  const msg = document.getElementById('splashMsg');
  msg.textContent = '🔍 Solicitando permissão...';
  navigator.geolocation.getCurrentPosition(
    pos => { LAT = pos.coords.latitude; LNG = pos.coords.longitude; gpsOk = true; startApp(true); },
    err => {
      if (err.code === 1) msg.textContent = '❌ Permissão negada. Toque em "Continuar sem GPS".';
      else { msg.textContent = '⚠️ Não foi possível obter GPS. Usando padrão.'; setTimeout(() => startApp(false), 1500); }
    },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
  );
}

function startApp(fromGPS) {
  gpsOk = fromGPS;
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  // Inicia watchPosition para rastreamento contínuo
  if (fromGPS && navigator.geolocation) {
    watchId = navigator.geolocation.watchPosition(
      pos => { LAT = pos.coords.latitude; LNG = pos.coords.longitude; gpsOk = true; onPosUpdate(); },
      () => {},
      { enableHighAccuracy: true, maximumAge: 5000 }
    );
  }

  updateGPSPill();
  initMap();
  renderList();
  renderTour();

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}

function onPosUpdate() {
  updateGPSPill();
  if (userMarker) userMarker.setLatLng([LAT, LNG]);
  updateMarkers();
  renderList();
}

function updateGPSPill() {
  const pill = document.getElementById('gpsPill');
  const dot = document.getElementById('gpsDot');
  const lbl = document.getElementById('gpsLabel');
  if (gpsOk) {
    pill.className = 'gps-pill ok';
    lbl.textContent = 'GPS ativo';
  } else {
    pill.className = 'gps-pill';
    lbl.textContent = 'Sem GPS';
  }
}

// ═══════════════════════════════════════════════
// MAPA — LEAFLET (100% GRATUITO, SEM API KEY)
// ═══════════════════════════════════════════════
function initMap() {
  map = L.map('map', { zoomControl: false, attributionControl: false }).setView([LAT, LNG], 14);

  // Tile gratuito do OpenStreetMap com tema escuro via CartoDB
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(map);

  // Controle de zoom menor
  L.control.zoom({ position: 'bottomleft' }).addTo(map);

  // Marcador do usuário
  const userIcon = L.divIcon({ className: '', html: '<div class="user-dot"></div>', iconSize: [18,18], iconAnchor: [9,9] });
  userMarker = L.marker([LAT, LNG], { icon: userIcon, zIndexOffset: 1000 }).addTo(map);

  // Marcadores dos bares
  BARS.forEach(bar => {
    const isInTour = tour.some(s => s.n === bar.n);
    const icon = L.divIcon({ className: '', html: `<div class="my-marker${isInTour?' tour':''}"></div>`, iconSize: [16,16], iconAnchor: [8,8] });
    const m = L.marker([bar.lat, bar.lng], { icon }).addTo(map);
    m.on('click', () => openPopup(bar, m));
    barMarkers[bar.n] = m;
  });
}

function openPopup(bar, marker) {
  const d = dist(bar);
  const inT = tour.some(s => s.n === bar.n);
  const murl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(bar.n+', Goiânia, GO')}`;
  const popup = L.popup({ maxWidth: 240 }).setContent(`
    <div class="popup-inner">
      <div class="popup-name">${bar.n}</div>
      <div class="popup-petisco">🍽 ${bar.p}</div>
      <div class="popup-dist">📍 ${fmt(d)} de você · R$ 40</div>
      <div style="display:flex;gap:6px;margin-top:10px">
        <button class="popup-btn" style="flex:1" onclick="toggleTourByName('${bar.n.replace(/'/g,"\\'")}');this.closest('.leaflet-popup').querySelector('.popup-btn:first-child').textContent='${inT?'＋ Roteiro':'✓ Adicionado'}'">
          ${inT ? '✓ No roteiro' : '＋ Roteiro'}
        </button>
        <a class="popup-btn" href="${murl}" target="_blank" style="flex:1">🗺 Maps</a>
      </div>
    </div>
  `);
  marker.bindPopup(popup).openPopup();
}

function updateMarkers() {
  BARS.forEach(bar => {
    const m = barMarkers[bar.n];
    if (!m) return;
    const inT = tour.some(s => s.n === bar.n);
    const icon = L.divIcon({ className: '', html: `<div class="my-marker${inT?' tour':''}"></div>`, iconSize: [16,16], iconAnchor: [8,8] });
    m.setIcon(icon);
  });
}

function recenterMap() {
  if (map) map.flyTo([LAT, LNG], 14, { duration: 1 });
}

function flyToBar(bar) {
  showTab('mapa');
  setTimeout(() => { if (map) map.flyTo([bar.lat, bar.lng], 17, { duration: 1.2 }); }, 100);
  const m = barMarkers[bar.n];
  if (m) setTimeout(() => openPopup(bar, m), 1300);
}

// ═══════════════════════════════════════════════
// DISTÂNCIA
// ═══════════════════════════════════════════════
function dist(b) {
  const R=6371, dLa=(b.lat-LAT)*Math.PI/180, dLn=(b.lng-LNG)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(LAT*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLn/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmt(km) { return km < 1 ? `${Math.round(km*1000)}m` : `${km.toFixed(1)}km`; }
function esc(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

// ═══════════════════════════════════════════════
// LISTA
// ═══════════════════════════════════════════════
function renderList() {
  const body = document.getElementById('listBody');
  if (!body) return;

  let bars = BARS.map(b => ({ ...b, d: dist(b) })).filter(b => {
    const mc = city==='all' || b.c===city;
    const ms = !q || b.n.toLowerCase().includes(q) || b.p.toLowerCase().includes(q) || b.a.toLowerCase().includes(q);
    return mc && ms;
  });

  // Ordena
  const near = bars.filter(b => b.d < 0.1);
  if (sort==='dist') {
    bars.sort((a,b) => a.d - b.d);
  } else {
    bars.sort((a,b) => a.n.localeCompare(b.n));
  }

  document.getElementById('resCnt').textContent = `${bars.length} bares`;
  const nearest = bars[0];
  if (nearest && nearest.d < 0.15) {
    document.getElementById('locInfo').textContent = `⭐ Você está no ${nearest.n}`;
    document.getElementById('locInfo').style.color = 'var(--beer)';
  } else if (nearest) {
    document.getElementById('locInfo').textContent = `📍 Mais próximo: ${fmt(nearest.d)}`;
  }

  const maxD = Math.max(...bars.map(b => b.d), 1);
  if (!bars.length) { body.innerHTML = '<div class="no-res">Nenhum bar encontrado.</div>'; return; }

  body.innerHTML = bars.map(bar => {
    const inT = tour.some(s => s.n === bar.n);
    const youhere = bar.d < 0.15;
    const isNear = bar.d <= 2 && !youhere;
    const pct = Math.max(5, 100 - (bar.d / maxD) * 92);
    const murl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(bar.n+', '+(bar.c==='Aparecida'?'Aparecida de Goiânia':'Goiânia')+', GO')}`;
    const igurl = `https://instagram.com/${bar.ig}`;
    let cls = 'bar-item';
    if (youhere) cls += ' you-here';
    else if (inT) cls += ' in-tour';
    let badge = '';
    if (youhere) badge = '<div class="item-badge badge-you">⭐ VOCÊ ESTÁ AQUI</div>';
    else if (inT) badge = '<div class="item-badge badge-tour">✓ ROTEIRO</div>';
    else if (isNear) badge = '<div class="item-badge badge-near">📍 PRÓXIMO</div>';
    return `<div class="${cls}">
      ${badge}
      <div class="item-name">${bar.n}</div>
      <div class="item-city">${bar.c==='Aparecida'?'Aparecida de Goiânia':'Goiânia'}</div>
      <div class="dist-bar-wrap">
        <div class="dist-lbl">📍 ${fmt(bar.d)}</div>
        <div class="dist-track"><div class="dist-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="petisco-box">
        <div class="petisco-lbl">Petisco participante</div>
        <div class="petisco-name">"${bar.p}"</div>
      </div>
      <div class="item-addr">📍 <span>${bar.a}</span></div>
      <div class="item-hrs">🕐 <span>${bar.h}</span></div>
      <div class="item-actions">
        <button class="btn-add ${inT?'on':''}" onclick="toggleTourByName('${esc(bar.n)}')">${inT?'✓ No roteiro':'＋ Roteiro'}</button>
        <button class="btn-ico" onclick="flyToBar(BARS.find(b=>b.n==='${esc(bar.n)}'))">🗺</button>
        <a class="btn-ico" href="${murl}" target="_blank">↗</a>
        <a class="btn-ico" href="${igurl}" target="_blank">📸</a>
      </div>
      <div class="item-price">R$ 40</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// TOUR / ROTEIRO
// ═══════════════════════════════════════════════
function toggleTourByName(name) {
  const bar = BARS.find(b => b.n === name);
  if (!bar) return;
  const i = tour.findIndex(s => s.n === name);
  if (i >= 0) { tour.splice(i, 1); toast(`❌ ${name} removido`); }
  else { tour.push(bar); toast(`✅ ${name} adicionado!`); }
  renderList(); renderTour(); updateMarkers();
  document.getElementById('tabCnt').textContent = tour.length;
}

function renderTour() {
  const pane = document.getElementById('tourPane');
  document.getElementById('tabCnt').textContent = tour.length;

  if (!tour.length) {
    pane.innerHTML = `
      <div class="tour-empty">
        <div class="tour-empty-icon">🍻</div>
        <div class="tour-empty-txt">Seu roteiro está vazio.<br>Vá para <strong>Bares</strong> e adicione os que quer visitar!</div>
      </div>`;
    return;
  }

  const totalDist = tour.reduce((acc, b) => acc + dist(b), 0);
  const stops = tour.map((b, i) => `
    <div class="stop-item">
      <div class="stop-num">${i+1}</div>
      <div class="stop-info">
        <div class="stop-name">${b.n}</div>
        <div class="stop-petisco">${b.p}</div>
      </div>
      <div class="stop-dist">${fmt(dist(b))}</div>
      <button class="stop-rm" onclick="toggleTourByName('${esc(b.n)}')">✕</button>
    </div>`).join('');

  // URL Google Maps com rota a partir do usuário
  const origin = `${LAT},${LNG}`;
  const dest = `${tour[tour.length-1].lat},${tour[tour.length-1].lng}`;
  const wpts = tour.slice(0,-1).map(s=>`${s.lat},${s.lng}`).join('|');
  let mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(dest)}&travelmode=driving`;
  if (wpts) mapsUrl += `&waypoints=${encodeURIComponent(wpts)}`;

  pane.innerHTML = `
    <div class="tour-header">
      <div class="tour-title">🗺 Meu Roteiro</div>
      <div class="tour-cnt-badge">${tour.length} paradas</div>
    </div>
    <div class="tour-total">
      <span>Total: R$ ${tour.length * 40}</span>
      <span style="color:var(--green3)">~${tour.length} petiscos</span>
    </div>
    ${stops}
    <div style="margin-top:16px">
      <a href="${mapsUrl}" target="_blank" class="btn-maps-big">🗺 ABRIR ROTA NO GOOGLE MAPS</a>
      <button class="btn-clr" onclick="clearTour()">✕ LIMPAR ROTEIRO</button>
    </div>`;
}

function clearTour() {
  tour = [];
  renderList(); renderTour(); updateMarkers();
  document.getElementById('tabCnt').textContent = 0;
  toast('🗑 Roteiro limpo!');
}

// ═══════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════
function showTab(id) {
  activeTab = id;
  document.querySelectorAll('.tab').forEach((t,i) => {
    const ids = ['mapa','lista','tour'];
    t.classList.toggle('active', ids[i]===id);
  });
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
  if (id==='mapa' && map) setTimeout(() => map.invalidateSize(), 50);
  if (id==='lista') renderList();
  if (id==='tour') renderTour();
}

// ═══════════════════════════════════════════════
// FILTROS
// ═══════════════════════════════════════════════
document.querySelectorAll('.chip[data-city]').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.chip[data-city]').forEach(x => x.classList.remove('on'));
    c.classList.add('on'); city = c.dataset.city; renderList();
  });
});
document.getElementById('search').addEventListener('input', e => { q = e.target.value.toLowerCase(); renderList(); });
function setSort(s) {
  sort = s;
  document.getElementById('chipDist').className = 'chip'+(s==='dist'?' sort-on':'');
  document.getElementById('chipName').className = 'chip'+(s==='name'?' sort-on':'');
  renderList();
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}
</script>
</body>
</html>
